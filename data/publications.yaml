    authors: "Chen Wang, Pavan Balaji, Marc Snir"
    venue: "SC"
    year: 2021
    tags: [mpi, tracing]
    highlight: true
    summary: "A scalable, near-lossless MPI tracing tool that records over 400 MPI functions with their full parameters and compresses traces online using a novel pattern-recognition algorithm — capturing more detail than prior tools at a fraction of the storage."
