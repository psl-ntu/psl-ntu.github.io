  # --- Preprints (venue: arXiv) ---
  - title: "HieraSparse: Hierarchical Semi-Structured Sparse KV Attention"
    authors: "Haoxuan Wang, Chen Wang"
    venue: "SC"
    year: 2026
    tags: [llm-systems, gpu, sparse-attention]
    highlight: true
    summary: "We compress the LLM attention KV cache by mapping a hierarchical, semi-structured sparsity pattern onto GPU sparse tensor cores. We turn that sparsity into real speedup in both the prefill and decode phases, reaching up to 4.57× faster attention than unstructured-sparsity methods at the same sparsity level, with a tunable quality/sparsity tradeoff."
    # image: "static/pub/figs/hierasparse.png"
    links:
      arxiv: "https://arxiv.org/abs/2604.16864"
      code: "https://github.com/psl-ntu/HieraSparse"

