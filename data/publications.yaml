  - title: "File System Semantics Requirements of HPC Applications"
    authors: "Chen Wang, Kathryn Mohror, Marc Snir"
    venue: "HPDC"
    year: 2021
    tags: [file-systems, semantics]
    highlight: true
    summary: "An empirical study of the file-system consistency that real HPC applications actually require. Using whole-stack I/O traces, we show most applications never depend on strict POSIX consistency — making the case for relaxed, higher-performance storage semantics."
    # image: "static/pub/figs/semantics-requirements.png"
    links:
      pdf: "static/pub/papers/21-HPDC-Semantics-Requirements.pdf"

