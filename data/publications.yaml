  # --- Peer-reviewed ---
  - title: "VerifyIO: Verifying Adherence to Parallel I/O Consistency Semantics"
    authors: "Chen Wang, Zhaobin Zhu, Kathryn Mohror, Sarah Neuwirth, Marc Snir"
    venue: "IPDPS"
    year: 2025
    tags: [parallel-io, verification]
    highlight: true
    summary: "We build a trace-driven framework that checks whether parallel I/O programs actually follow the consistency semantics of the underlying storage system. We formalize storage consistency models and use Recorder traces to automatically verify adherence, exposing violations in production I/O libraries that were previously invisible."
    # image: "static/pub/figs/verifyio.png"   # optional: drop a figure here
    links:
      pdf: "static/pub/papers/25-IPDPS-VerifyIO.pdf"
      code: "https://github.com/wangvsa/VerifyIO"
      doi: "https://ieeexplore.ieee.org/document/11078511/"

