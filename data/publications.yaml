  - title: "Formal Definitions and Performance Comparison of Consistency Models for Parallel File Systems"
    authors: "Chen Wang, Kathryn Mohror, Marc Snir"
    venue: "IEEE TPDS"
    year: 2024
    tags: [consistency, file-systems]
    highlight: true
    summary: "Formal definitions for the full spectrum of consistency models used by parallel file systems, unifying semantics that were previously specified only informally. We compare the models side by side and quantify the performance cost of stronger guarantees."
    # image: "static/pub/figs/consistency-models.png"
    links:
      pdf: "static/pub/papers/24-TPDS-Consistency-Study.pdf"

